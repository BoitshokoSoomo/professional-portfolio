    <div class="wbr"><a class="wab ab" href="https://github.com/BoitshokoSoomo/expressBookReviews" target="_blank" rel="noopener noreferrer">⎇ GitHub</a></div>
  `},
  {id:"phms",icon:"🏥",title:"Hospital System",color:"#f59e0b",bg:"linear-gradient(135deg,#f59e0b,#22c55e)",w:510,h:500,body:`
    <div class="ws"><div class="wh1">Provincial Hospital Management System</div><div style="font-size:13px;color:var(--yellow);margin-bottom:11px">Enterprise Architecture Proposal · 4-Page Technical Document</div><p class="wp">A detailed enterprise implementation proposal for digitising public healthcare operations across South African provincial hospitals. Covers 4 operational modules with complete requirements, data workflows, and functional mapping blueprints.</p><div class="pstat"><div class="psi"><strong>4</strong>Modules</div><div class="psi"><strong>4</strong>Pages</div><div class="psi"><strong>3</strong>Month timeline</div></div></div>
    <div class="ws"><div class="wh2">Modules Designed</div><p class="wp">Patient Records Management · Billing Automation Workflows · Pharmaceutical Inventory Tracking · System Integration Architecture</p></div>
    <div class="ws"><div class="wh2">Skills Demonstrated</div><span class="tag ty">Business Analysis</span><span class="tag ty">Requirements Gathering</span><span class="tag">Process Mapping</span><span class="tag">Technical Writing</span><span class="tag tp">System Design</span></div>
  `},
  {id:"financeapp",icon:"💰",title:"Finance App",color:"#22c55e",bg:"linear-gradient(135deg,#22c55e,#3b82f6)",w:520,h:520,body:`
    <div class="ws"><div class="wh1">Finance App</div><div style="font-size:13px;color:var(--green);margin-bottom:11px">Personal Finance Management · React + Vite</div><p class="wp">A personal finance management application for tracking expenses, managing budgets, and visualising spending patterns. Built with React and Vite for a fast, responsive user experience. Deployed on Vercel with automatic deployments from GitHub.</p><div class="pstat"><div class="psi"><strong>React</strong>Frontend</div><div class="psi"><strong>Vite</strong>Bundler</div><div class="psi"><strong>Live</strong>Deployed</div></div></div>
    <div class="ws"><div class="wh2">Features</div><p class="wp">Expense tracking · Budget management · Spending visualisation · Responsive design · Fast build times</p></div>
    <div class="ws"><div class="wh2">Tech Stack</div><span class="tag">React</span><span class="tag">Vite</span><span class="tag tg">JavaScript</span><span class="tag tp">CSS</span></div>
    <div class="wbr"><a class="wab ab" href="https://finance-app-web-oteu.vercel.app/" target="_blank" rel="noopener noreferrer">🚀 Live Demo</a><a class="wab ag" href="https://github.com/BoitshokoSoomo/finance-app" target="_blank" rel="noopener noreferrer">⎇ GitHub</a></div>
  `},
];

let S={};let zTop=100;let activeId=null;
W.forEach(w=>{S[w.id]={open:false,min:false,x:80+Math.random()*100,y:40+Math.random()*60,width:w.w,height:w.h}});

function safeId(id){return String(id).replace(/[^a-z0-9_-]/gi,"")}

function secureExternalLinks(scope=document){
  scope.querySelectorAll('a[target="_blank"]').forEach(a=>{
    a.rel="noopener noreferrer";
  });
}

function renderIcons(){
  document.getElementById("iconGrid").innerHTML=W.map(w=>`
    <button class="icon" type="button" onclick="openW('${safeId(w.id)}')" aria-label="Open ${w.title}">
      <div class="icon-img" style="background:${w.bg}">${w.icon}</div>
      <div class="icon-label">${w.title}</div>
    </button>`).join("");
}

function renderSM(){
  document.getElementById("smItems").innerHTML=W.map(w=>`
    <button class="smi" type="button" onclick="openW('${safeId(w.id)}');toggleStart(false)" aria-label="Open ${w.title}">
      <div class="smii">${w.icon}</div>
      <div class="smn">${w.title}</div>
    </button>`).join("");
}

function openW(id){
  const w=W.find(x=>x.id===id),s=S[id],c=document.getElementById("wc");
  if(!document.getElementById("win-"+id)){
    const el=document.createElement("div");
    el.className="window";el.id="win-"+id;
    el.style.cssText=`left:${s.x}px;top:${s.y}px;width:${s.width}px;height:${s.height}px;z-index:${++zTop}`;
    el.innerHTML=`<div class="wh" onpointerdown="startDrag(event,'${id}')"><div class="wc"><button class="wb wclose" type="button" onclick="closeW('${id}')" aria-label="Close ${w.title}"></button><button class="wb wmin" type="button" onclick="minW('${id}')" aria-label="Minimize ${w.title}"></button><button class="wb wmax" type="button" onclick="maxW('${id}')" aria-label="Maximize ${w.title}"></button></div><span class="wicon">${w.icon}</span><div class="wtitle">${w.title}</div></div><div class="wb-body">${w.body}</div><div class="rh" onpointerdown="startResize(event,'${id}')" aria-hidden="true"></div>`;
    el.addEventListener("pointerdown",()=>focusW(id));
    c.appendChild(el);
    secureExternalLinks(el);
  }
  S[id].open=true;S[id].min=false;
  document.getElementById("win-"+id).classList.add("visible");
  focusW(id);updateTB();
}

function closeW(id){
  S[id].open=false;
  document.getElementById("win-"+id)?.classList.remove("visible");
  if(activeId===id)activeId=null;
  updateTB();
}
function minW(id){
  S[id].min=true;
  document.getElementById("win-"+id)?.classList.remove("visible");
  if(activeId===id)activeId=null;
  updateTB();
}

let mx={};
function maxW(id){
  const el=document.getElementById("win-"+id);if(!el)return;
  if(mx[id]){el.style.left=S[id].x+"px";el.style.top=S[id].y+"px";el.style.width=S[id].width+"px";el.style.height=S[id].height+"px";el.style.borderRadius="";mx[id]=false}
  else{
    const r=el.getBoundingClientRect();
    S[id].x=r.left;S[id].y=r.top;S[id].width=r.width;S[id].height=r.height;
    el.style.cssText+=";left:0;top:0;width:100vw;height:calc(100vh - 52px);border-radius:0";
    mx[id]=true;
  }
}

function focusW(id){
  activeId=id;
  document.querySelectorAll(".window").forEach(w=>w.classList.remove("focused"));
  const el=document.getElementById("win-"+id);
  if(el){el.classList.add("focused");el.style.zIndex=++zTop}
  document.querySelectorAll(".tb-app").forEach(a=>a.classList.remove("active"));
  document.getElementById("tb-"+id)?.classList.add("active");
}

function updateTB(){
  document.getElementById("tbApps").innerHTML=W.filter(w=>S[w.id].open).map(w=>`
    <button class="tb-app ${activeId===w.id&&!S[w.id].min?'active':''}" type="button" id="tb-${w.id}" onclick="tbClick('${w.id}')" aria-label="${S[w.id].min?'Restore':'Minimize'} ${w.title}">
      <span>${w.icon}</span><span>${w.title}</span>
    </button>`).join("");
}

function tbClick(id){S[id].min?openW(id):minW(id)}

let drag=null;
function startDrag(e,id){
  if(e.target.classList.contains("wb"))return;
  if(mx[id])return;
  const r=document.getElementById("win-"+id).getBoundingClientRect();
  drag={id,ox:e.clientX-r.left,oy:e.clientY-r.top};focusW(id);e.preventDefault();
  e.currentTarget.setPointerCapture?.(e.pointerId);
}
document.addEventListener("pointermove",e=>{
  if(drag){const el=document.getElementById("win-"+drag.id);
    const nx=Math.max(0,Math.min(e.clientX-drag.ox,window.innerWidth-100));
    const ny=Math.max(0,Math.min(e.clientY-drag.oy,window.innerHeight-100));
    el.style.left=nx+"px";el.style.top=ny+"px";S[drag.id].x=nx;S[drag.id].y=ny;}
  if(rsz){const el=document.getElementById("win-"+rsz.id);
    const width=Math.max(360,rsz.sw+e.clientX-rsz.sx);
    const height=Math.max(260,rsz.sh+e.clientY-rsz.sy);
    el.style.width=width+"px";el.style.height=height+"px";
    S[rsz.id].width=width;S[rsz.id].height=height;}
});
document.addEventListener("pointerup",()=>{drag=null;rsz=null});
document.addEventListener("pointercancel",()=>{drag=null;rsz=null});

let rsz=null;
function startResize(e,id){
  if(mx[id])return;
  const r=document.getElementById("win-"+id).getBoundingClientRect();
  rsz={id,sx:e.clientX,sy:e.clientY,sw:r.width,sh:r.height};focusW(id);e.preventDefault();e.stopPropagation();
  e.currentTarget.setPointerCapture?.(e.pointerId);
}

function toggleStart(force){
  const menu=document.getElementById("start-menu");
  const isOpen=typeof force==="boolean"?force:!menu.classList.contains("open");
  menu.classList.toggle("open",isOpen);
  document.getElementById("start-btn").setAttribute("aria-expanded",String(isOpen));
}
document.addEventListener("click",e=>{
  if(!e.target.closest("#start-menu")&&!e.target.closest("#start-btn"))
    toggleStart(false);
});

function updateClock(){
  const n=new Date();
  document.getElementById("clock").innerHTML=
    n.toLocaleTimeString("en-ZA",{hour:"2-digit",minute:"2-digit"})+"<br>"+
    n.toLocaleDateString("en-ZA",{day:"numeric",month:"short"});
}
setInterval(updateClock,1000);updateClock();
renderIcons();renderSM();
setTimeout(()=>openW("about"),300);
</script>
